name = "cometens-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ─── Testnet (OP Sepolia + Ethereum Sepolia) ──────────────────────────────────
# Deploy: wrangler deploy --env testnet
# URL:    https://cometens-gateway.jhfnetboy.workers.dev
# 
# Secrets (per-env, use `wrangler secret put`):
#   OP_RPC_URL                 — Optimism RPC endpoint (OP Sepolia)
#   ETH_RPC_URL                — Ethereum L1 RPC (Sepolia) — required for proof mode
#   PRIVATE_KEY_SUPPLIER       — Key that signs CCIP responses (signature mode only)
#
[env.testnet]
name = "cometens-gateway"
[env.testnet.vars]
NETWORK = "op-sepolia"
L2_RECORDS_ADDRESS = "0x7E9840717CeD353eF5C6CE13673594e8bE4B5c5e"
ROOT_DOMAIN = "aastar.eth"
PROOF_MODE = "true"  # C4: Bedrock storage proof mode — requires ETH_RPC_URL secret
ALLOWED_SENDERS = "0xEf0252506928Ee47526edd1C19DbF264FA2Fc02F"  # OPResolver on Eth Sepolia (C3')

# Phase 2 — KV record cache (read by gateway, written by API worker)
# Same namespace ID as API Worker's RECORD_CACHE binding.
[[env.testnet.kv_namespaces]]
binding = "RECORD_CACHE"
id = "6147f1fe8d5141389e10475cab1f6647"

# [[env.testnet.analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "cometens_gateway"
# NOTE: Enable Analytics Engine in CF Dashboard before uncommenting

# ─── Production (OP Mainnet + Ethereum Mainnet) ───────────────────────────────
# Deploy: wrangler deploy --env production
# URL:    https://cometens-gateway-production.jhfnetboy.workers.dev
#         (or custom domain — uncomment routes below)
# 
# Secrets (per-env, use `wrangler secret put`):
#   OP_RPC_URL                 — Optimism RPC endpoint (OP Mainnet)
#   ETH_RPC_URL                — Ethereum L1 RPC (Mainnet) — required for proof mode
#   PRIVATE_KEY_SUPPLIER       — Key that signs CCIP responses (signature mode only)
#
[env.production]
name = "cometens-gateway-production"
[env.production.vars]
NETWORK = "op-mainnet"
L2_RECORDS_ADDRESS = "0x0000000000000000000000000000000000000000"  # set after mainnet deploy
ROOT_DOMAIN = "aastar.eth"
# PROOF_MODE = "true"  # enable after mainnet OPResolver deployment

# [[env.production.kv_namespaces]]
# binding = "RECORD_CACHE"
# id = "REPLACE_WITH_RECORD_CACHE_NAMESPACE_ID"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "cometens_gateway"

# Uncomment after assigning a custom domain in the CF dashboard:
# [[env.production.routes]]
# pattern = "gateway.yourdomain.com/*"
# custom_domain = true
